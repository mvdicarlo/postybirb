appId: com.mvdicarlo.postybirb
copyright: Copyright (c) 2026 Michael DiCarlo
productName: PostyBirb
executableName: PostyBirb
artifactName: '${productName}-${version}-${os}-${arch}.${ext}'

publish:
  provider: github
  owner: mvdicarlo
  repo: postybirb

directories:
  buildResources: packaging-resources
  output: release

compression: maximum
removePackageScripts: true

# Unpack native dependencies
asarUnpack:
  - 'node_modules/@img/**/*'
  - '**/*.node'
  - '**/*.dylib'
  - '**/*.so'

mac:
  category: public.app-category.productivity
  entitlements: packaging-resources/entitlements.mac.plist
  entitlementsInherit: packaging-resources/entitlements.mac.plist
  hardenedRuntime: true
  type: distribution
  icon: icons/icon.icns
  gatekeeperAssess: false
  # This ensures all binaries including native modules are signed
  signIgnore: []
  singleArchFiles: "Contents/Resources/app.asar.unpacked/node_modules/@img/**"
  x64ArchFiles: "Contents/Resources/app.asar.unpacked/**/*.{node,dylib}"
  # mergeASARs requires @electron/asar to work correctly with Node 22+.
  # A yarn patch on @electron/asar 3.4.1 fixes promisify(glob) and promisify(stream.pipeline)
  # which hang on Node 22. This flag can be removed (defaults to true) once electron-builder
  # ships with @electron/universal >=3.0.0 (which uses @electron/asar >=4.0.0).
  mergeASARs: true
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  notarize: true

linux:
  category: Network
  icon: icons/icon_256x256x32.png
  synopsis: 'PostyBirb is a desktop application for posting to multiple websites'
  description: 'PostyBirb helps artists post art and other multimedia to multiple websites more quickly.'
  target:
    - target: AppImage
    - target: snap
    - target: deb
    - target: rpm

snap:
  publish:
    provider: github
  summary: 'PostyBirb - Multi-site posting application'
  description: 'PostyBirb helps artists post art and other multimedia to multiple websites more quickly.'
  grade: stable
  confinement: strict
  plugs:
    - default
  artifactName: '${productName}-${version}-linux-snap-${arch}.${ext}'

deb:
  priority: optional
  depends:
    - libnotify4
    - libxtst6
    - libnss3
  artifactName: '${productName}-${version}-linux-deb-${arch}.${ext}'

rpm:
  depends:
    - libnotify
    - libappindicator
    - libXtst
    - nss
  artifactName: '${productName}-${version}-linux-rpm-${arch}.${ext}'

appImage:
  artifactName: '${productName}-${version}-linux-${arch}.${ext}'

# Generate separate update files for different Linux formats

nsis:
  deleteAppDataOnUninstall: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PostyBirb
  include: packaging-resources/installer.nsh
  installerLanguages:
    - en_US
  language: 1033

win:
  icon: icons/icon.ico
  requestedExecutionLevel: asInvoker
  signtoolOptions:
    publisherName:
      - "Michael DiCarlo"
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

portable:
  artifactName: '${productName}-${version}-portable-${arch}.${ext}'

files:
  - 'dist/**/*'
  - 'node_modules/**/*'
  - 'package.json'
  - '!**/*.log'
  - '!**/*.md'
  - '!**/README*'
  - '!**/CHANGELOG*'
  - '!**/LICENSE*'
  - '!**/*.d.ts'
  - '!**/test/**/*'
  - '!**/tests/**/*'
  - '!**/.git/**/*'
  - '!**/.DS_Store'
  - '!*.{ts,js,yml,yaml,md}'
  - '!{babel.config.js,commitlint.config.js,drizzle.config.ts,jest.*,lingui.config.ts,nx.json,tsconfig.*}'
