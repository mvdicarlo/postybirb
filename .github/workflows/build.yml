name: Build/Release

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (universal)
            os: macos-latest
            platform: mac
            arch: universal
            # mac uploads via softprops because electron-builder's own
            # uploader stalls on large universal DMGs
            publish: never

          - name: Linux (x64)
            os: ubuntu-latest
            platform: linux
            arch: x64
            # linux publishes natively so the Snap Store upload still runs
            publish: always

          - name: Linux (arm64)
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            publish: always

          - name: Windows (x64)
            os: windows-latest
            platform: win
            arch: x64
            publish: never

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Its required to enable corepack before node install because it uses yarn to get cache dir
      # https://github.com/actions/setup-node/issues/531#issuecomment-1217094233
      # On migration to node 26 for actions corepack will need to be installed using npm
      - name: Enable corepack to use Yarn v4
        run: |
          # Remove any globally installed yarn v1 that may conflict with corepack's shim (especially on Windows)
          npm uninstall -g yarn
          # Replaces yarn in PATH with corepack's yarn shim
          corepack enable
          # Downloads yarn
          corepack prepare --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            node_modules/.cache/electron
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-cache-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-cache-

      - name: Install dependencies
        run: yarn install --immutable
        env:
          CYPRESS_INSTALL_BINARY: 0
          ELECTRON_CACHE: ~/.cache/electron
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder

      # This is needed to prevent ids showing instead of non translated i18n texts in production builds
      - name: Extract messages
        run: yarn lingui:extract

      - name: Patch electron-builder.yml for fork repositories
        if: github.event.repository.fork
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            const configPath = './electron-builder.yml';
            const configContent = fs.readFileSync(configPath, 'utf8');
            let config = yaml.load(configContent);

            config.publish = {
              provider: 'github',
              owner: context.repo.owner,
              repo: context.repo.repo
            };

            if (config.linux && config.linux.target) {
              config.linux.target = [{ target:"AppImage" }]
            }

            // Remove snap configuration entirely for forks
            delete config.snap;

            // Remove deb and rpm configurations for forks
            delete config.deb;
            delete config.rpm;

            // Write the modified config back
            fs.writeFileSync(configPath, yaml.dump(config));

            console.log('✅ Patched electron-builder.yml for fork repository');
            console.log(`📦 Publish target: ${context.repo.owner}/${context.repo.repo}`);
            console.log(yaml.dump(config))

      - name: Install snapcraft
        if: matrix.platform == 'linux' && !github.event.repository.fork
        run: |
          sudo apt-get update
          sudo apt-get install -y snapd
          # Snapcraft 9 dropped support for the core20 base used by electron-builder snaps.
          sudo snap install snapcraft --classic --channel=8.x/stable

      - name: Install Ruby + fpm (system) for Linux packaging
        if: matrix.platform == 'linux' && !github.event.repository.fork
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm
          # Ensure gem bindir is on PATH for subsequent steps
          echo "$(ruby -e 'print Gem.bindir')" >> "$GITHUB_PATH"
          echo "Ruby:"; ruby -v
          echo "fpm:"; fpm --version

      - name: Inject Application Insights connection string
        env:
          APP_INSIGHTS_KEY: ${{ secrets.APP_INSIGHTS_KEY }}
        run: corepack yarn inject:app-insights

      - name: Build application
        run: yarn build:prod
        env:
          NODE_ENV: production

      - name: Rebuild native modules for Electron
        run: corepack yarn electron-builder install-app-deps

      - name: Build Electron app (fork)
        if: github.event.repository.fork
        run: yarn electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish ${{ matrix.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app
        if: (!github.event.repository.fork)
        run: yarn electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish ${{ matrix.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAPCRAFT_BUILD_ENVIRONMENT: host
          # ✅ Use system fpm for Linux only
          USE_SYSTEM_FPM: ${{ matrix.platform == 'linux' && 'true' || '' }}

      # electron-builder uploads can stall at the end of large macOS universal
      # DMG publishing, so mac/windows build with `--publish never` above and
      # upload the generated artifacts (including the latest*.yml autoupdate
      # metadata) here. Linux publishes natively (matrix.publish == always) so
      # the Snap Store upload still happens and this step is skipped.
      - name: Get app version
        if: matrix.publish == 'never'
        id: appVersion
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish artifacts to GitHub Release
        if: matrix.publish == 'never'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.appVersion.outputs.version }}
          name: v${{ steps.appVersion.outputs.version }}
          draft: true
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.exe
            release/*.blockmap
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json for docker tag
        uses: actions/github-script@v8
        id: packageVersion
        with:
          # Prevent action from using JSON.stringify on result string to remove " wrapping around version
          result-encoding: string
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"))
            return pkg.version

      - name: Build and publish a Docker image for '${{github.repository}}'
        uses: macbre/push-to-ghcr@master

        if: matrix.platform == 'linux' && (matrix.arch == 'x64' || matrix.arch == 'arm64')
        with:
          image_name: "${{github.repository}}"
          image_tag: latest,${{steps.packageVersion.outputs.result}}
          platforms: "linux/${{ matrix.arch == 'x64' && 'amd64' || 'arm64' }}"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dockerfile: "./Dockerfile"
